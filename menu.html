<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Restaurant - Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <section class="container">

        <header class="top-bar">
            <a class="btn-cerrar" href="restaurante.html"><i class="fa-solid fa-xmark"></i></a>
            <h2>Grand Restaurant</h2>
        </header>

        <main>
            <p class="categoria-menu">MAIN DISHES</p>

            <div class="lista-platos">
                <a class="item-plato" href="producto.html">
                    <img src="./img/fideos.jpg" alt="Fideos">
                    <div class="info-plato">
                        <h4>Fideos</h4>
                        <p>Deep fried of vegetables</p>
                    </div>
                    <span class="precio-plato">$7.99</span>
                </a>

                <a class="item-plato" href="producto.html">
                    <img src="./img/ciabatta-carpaccio.jpg" alt="Ciabatta Carpaccio">
                    <div class="info-plato">
                        <h4>Ciabatta Carpaccio</h4>
                        <p>Deep fried of vegetables</p>
                    </div>
                    <span class="precio-plato">$6.99</span>
                </a>

                <a class="item-plato" href="producto.html">
                    <img src="./img/clabatta-vitello.jpg" alt="Clabatta Vitello Tonato">
                    <div class="info-plato">
                        <h4>Clabatta Vitello Tonato</h4>
                        <p>Deep fried of vegetables</p>
                    </div>
                    <span class="precio-plato">$6.99</span>
                </a>

                <a class="item-plato" href="producto.html">
                    <img src="./img/caprese-salada.jpg" alt="Caprese Salada">
                    <div class="info-plato">
                        <h4>Caprese Salada</h4>
                        <p>Deep fried of vegetables</p>
                    </div>
                    <span class="precio-plato">$2.99</span>
                </a>
            </div>
        </main>

        <footer class="tab-bar">
            <a class="tab-item" href="restaurante.html">DETAILS</a>
            <a class="tab-item activo" href="menu.html">MENU</a>
            <a class="tab-item" href="reviews.html">REVIEWS</a>
        </footer>
    </section>
</body>
</html>
