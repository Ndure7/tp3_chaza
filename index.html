<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <section class="container">
        <header>
            <div class="degradado"></div>
            <div class="bienvenida">
                <h3>Bienvenido a nuestro restaurante</h3>
                <h6>¡Disfruta de la mejor comida de la ciudad!</h6>
            </div>
            <section class="buscador">
                <i class="cuadrado-boton centrar fa fa-location-dot" style="color: rgb(255, 255, 255)"></i>
                <input type="text" placeholder="Buscar restaurante">
                <button class="btn-buscar"><i class="fas fa-search"></i></button>
            </section>
        </header>

        <main>
            <nav class="categorias">
                <a class="item-categoria" href="#">
                    <i class="fa-solid fa-pizza-slice"></i>
                    <span> Pizza </span>
                    
                </a>
                <a class="item-categoria" href="#">
                    <i class="fa-solid fa-burger"></i>
                    <span> Burguer </span>
                </a>
                <a class="item-categoria" href="#">
                    <i class="fa-solid fa-fish"></i>
                    <span> Fish </span>
                </a>
                  <a class="item-categoria" href="#">
                    <i class="fa-solid fa-bowl-rice"></i>
                    <span> Arroz </span>
                </a>
                  <a class="item-categoria" href="#">
                    <i class="fa-solid fa-ice-cream"></i>
                    <span> Helado </span>
                </a>
                  <a class="item-categoria" href="#">
                    <i class="fa-solid fa-hotdog"></i>
                    <span> Pancho </span>
                </a>
            </nav>
            <section class="restaurantes">
            </section>
        </main>

    </section>
<!-- comentario -->
    
</body>
</html>
